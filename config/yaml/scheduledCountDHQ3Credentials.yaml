steps:



- name: 'gcr.io/cloud-builders/gcloud'
  args: [
    'run',
    'deploy', 
    '${_SERVICE}',
    '--region=${_REGION}',
    '--source=${_SOURCE}',
    '--function=${_FUNCTION}',
    '--base-image=${_BASE_IMAGE}',
    '--memory=${_MEMORY}',
    '--timeout=${_TIMEOUT}',
    '--ingress=internal',
    '--env-vars-file=${_VARIABLES}'
  ]

substitutions:
  _BASE_IMAGE: us-central1-docker.pkg.dev/serverless-runtimes/google-22-full/runtimes/nodejs20
  _FUNCTION: scheduledCountDHQ3Credentials
  _MEMORY: 256Mi
  _REGION: us-central1
  _SERVICE: scheduledcountdhq3credentials
  _SOURCE: .
  _TIMEOUT: 540s