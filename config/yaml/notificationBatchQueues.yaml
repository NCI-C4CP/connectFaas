steps:
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-lc'
    - |
      set -euo pipefail
      for QUEUE_NAME in "${_QUEUE_NAME}" "${_QUEUE_NAME_MICROSOFT}"; do
        if ! gcloud tasks queues describe "${QUEUE_NAME}" --location="${_LOCATION}" >/dev/null 2>&1; then
          gcloud tasks queues create "${QUEUE_NAME}" \
            --location="${_LOCATION}" \
            --max-concurrent-dispatches="${_MAX_CONCURRENT_DISPATCHES}" \
            --max-dispatches-per-second="${_MAX_DISPATCHES_PER_SECOND}" \
            --max-attempts="${_MAX_ATTEMPTS}" \
            --min-backoff="${_MIN_BACKOFF}" \
            --quiet
        fi
        gcloud tasks queues update "${QUEUE_NAME}" \
          --location="${_LOCATION}" \
          --max-concurrent-dispatches="${_MAX_CONCURRENT_DISPATCHES}" \
          --max-dispatches-per-second="${_MAX_DISPATCHES_PER_SECOND}" \
          --max-attempts="${_MAX_ATTEMPTS}" \
          --min-backoff="${_MIN_BACKOFF}" \
          --quiet
      done

substitutions:
  _LOCATION: us-central1
  _QUEUE_NAME: processNotificationBatchBulkDefault
  _QUEUE_NAME_MICROSOFT: processNotificationBatchBulkMicrosoft
  _MAX_CONCURRENT_DISPATCHES: '1'
  _MAX_DISPATCHES_PER_SECOND: '1'
  _MAX_ATTEMPTS: '5'
  _MIN_BACKOFF: 60s
