steps:



- name: 'gcr.io/cloud-builders/gcloud'
  args: [
    'run',
    'deploy',
    '${_SERVICE}',
    '--region=${_REGION}',
    '--source=${_SOURCE}',
    '--function=${_FUNCTION}',
    '--base-image=${_BASE_IMAGE}',
    '--timeout=${_TIMEOUT}',
    '--allow-unauthenticated',
    '--ingress=internal',
    '--env-vars-file=${_VARIABLES}'
  ]

substitutions:
  _BASE_IMAGE: us-central1-docker.pkg.dev/serverless-runtimes/google-22-full/runtimes/nodejs20
  _FUNCTION: exportNotificationsToBucket
  _REGION: us-central1
  _SERVICE: exportnotificationstobucket
  _SOURCE: .
  _TIMEOUT: 480s